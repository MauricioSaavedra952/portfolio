<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            color: #24292f;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #d0d7de;
            margin-top: 20px;
        }

        .header-row h3 {
            margin-bottom: 5px;
        }

        .date {
            font-weight: bold;
            color: #57606a;
        }

        .publication {
            background-color: #f6f8fa;
            padding: 15px;
            border-left: 4px solid #0969da;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Your Name</h1>
    <p>Researcher & Developer</p>

    <div class="header-row">
        <h3><strong>Carnegie Mellon University</strong> — Research Assistant</h3>
        <span class="date">2022 - Present</span>
    </div>

    <h2>Publications</h2>
    <div class="publication">
        <strong>"The Title of Your Research Paper"</strong><br>
        <em>Journal or Conference Name</em>, 2024<br>
        <a href="#">Link to Publication</a>
    </div>

    <h2>Projects</h2>
    <p>Coming soon...</p>

</body>
</html>
